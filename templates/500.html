{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>サーバーエラー | スノトラ</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="icon" href="{% static 'images/favicon.png' %}" type="image/png">
</head>
<body class="flex flex-col min-h-screen bg-gray-100">
    <main class="flex-grow flex items-center justify-center">
        <div class="text-center p-8">
            <p class="text-6xl font-extrabold text-sky-600 mb-4">500</p>
            <h1 class="text-2xl font-bold text-gray-800 mb-2">サーバーエラーが発生しました</h1>
            <p class="text-gray-500 mb-8">しばらく時間をおいてから再度お試しください。</p>
            <a href="/"
               class="inline-flex justify-center py-3 px-8 border border-transparent rounded-md
                      shadow-sm text-base font-bold text-white bg-sky-600
                      hover:bg-sky-700 transition duration-300 ease-in-out">
                トップページへ戻る
            </a>
        </div>
    </main>
</body>
</html>
