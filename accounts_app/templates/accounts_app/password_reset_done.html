{% extends 'accounts_app/base.html' %}
{% block title %}メールを送信しました | スノトラ{% endblock %}

{% block content %}
<div class="container mx-auto p-4 sm:p-6 lg:p-8 max-w-md">
    <h1 class="text-center text-3xl font-extrabold text-gray-800 mb-4">メールを送信しました</h1>
    <div class="bg-white p-6 rounded-lg shadow-xl border border-gray-200 text-center space-y-4">
        <p class="text-gray-700">
            入力されたメールアドレスに、パスワード再設定用のリンクをお送りしました。
        </p>
        <p class="text-sm text-gray-500">
            メールが届かない場合は、迷惑メールフォルダをご確認いただくか、
            登録済みのメールアドレスかどうかをご確認ください。
        </p>
    </div>
    <div class="text-center mt-6">
        <a href="{% url 'login_select' %}" class="text-sm text-sky-600 hover:underline">ログインページに戻る</a>
    </div>
</div>
{% endblock %}
