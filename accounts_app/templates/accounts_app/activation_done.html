{% extends 'accounts_app/base.html' %}
{% block title %}メール確認完了 | スノトラ{% endblock %}

{% block content %}
<div class="container mx-auto p-4 sm:p-6 lg:p-8 max-w-md">
    <h1 class="text-center text-3xl font-extrabold text-gray-800 mb-4">メール確認が完了しました</h1>
    <div class="bg-white p-6 rounded-lg shadow-xl border border-gray-200 text-center space-y-4">
        <p class="text-gray-700">ご登録ありがとうございます。<br>以下のボタンからログインしてください。</p>
    </div>
    <div class="text-center mt-6">
        <a href="{% url 'login_select' %}"
           class="inline-flex justify-center py-3 px-8 border border-transparent rounded-md
                  shadow-sm text-base font-bold text-white bg-sky-600
                  hover:bg-sky-700 transition duration-300 ease-in-out">
            ログインページへ
        </a>
    </div>
</div>
{% endblock %}
