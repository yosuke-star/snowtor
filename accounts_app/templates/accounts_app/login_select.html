{% extends 'accounts_app/base.html' %}
{% block title %}ログイン | スノトラ{% endblock %}

{% block content %}
<div class="container mx-auto p-4 sm:p-6 lg:p-8 max-w-md">
    <h1 class="text-center text-3xl font-extrabold text-gray-800 mb-8">ログイン</h1>
    <p class="text-center text-xl text-gray-800 mb-8">ご利用のアカウントを選択してください</p>
    <div class="bg-white p-6 rounded-lg shadow-xl border border-gray-200 space-y-4">
        <a href="{% url 'student_login' %}"
           class="flex justify-center items-center py-3 px-4 rounded-md shadow-sm
                  text-base font-bold text-white bg-sky-600
                  hover:bg-sky-700 transition duration-300 ease-in-out">
            受講者としてログイン
        </a>
        <a href="{% url 'instructor_login' %}"
           class="flex justify-center items-center py-3 px-4 rounded-md shadow-sm
                  text-base font-bold text-sky-600 border border-sky-600
                  hover:bg-sky-50 transition duration-300 ease-in-out">
            インストラクターとしてログイン
        </a>
    </div>
</div>
{% endblock %}
