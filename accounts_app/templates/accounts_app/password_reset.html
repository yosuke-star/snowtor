{% extends 'accounts_app/base.html' %}
{% block title %}パスワードをお忘れの方 | スノトラ{% endblock %}

{% block content %}
<div class="container mx-auto p-4 sm:p-6 lg:p-8 max-w-md">
    <h1 class="text-center text-3xl font-extrabold text-gray-800 mb-4">パスワードの再設定</h1>
    <p class="text-center text-sm text-gray-600 mb-8">
        登録済みのメールアドレスを入力してください。<br>
        パスワード再設定用のリンクをお送りします。
    </p>
    <div class="bg-white p-6 rounded-lg shadow-xl border border-gray-200">
        <form method="post" class="space-y-6">
            {% csrf_token %}
            <div>
                <label for="id_email" class="block text-sm font-medium text-gray-700">メールアドレス</label>
                <input
                    type="email"
                    name="email"
                    id="id_email"
                    required
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm
                           focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
            </div>
            <div class="pt-4">
                <button
                    type="submit"
                    class="flex w-full justify-center py-3 px-4 border border-transparent rounded-md
                           shadow-sm text-base font-bold text-white bg-sky-600
                           hover:bg-sky-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-sky-500
                           transition duration-300 ease-in-out cursor-pointer">
                    送信する
                </button>
            </div>
        </form>
    </div>
    <div class="text-center mt-6">
        <a href="{% url 'login_select' %}" class="text-sm text-sky-600 hover:underline">ログインページに戻る</a>
    </div>
</div>
{% endblock %}
